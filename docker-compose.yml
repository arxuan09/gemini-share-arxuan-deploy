services:
  mysql:
    image: mysql:8.0
    container_name: gemini-share-arxuan-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: gemini123
      MYSQL_DATABASE: gemini
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -pgemini123 --silent
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: gemini-share-arxuan-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  gemini-share-arxuan:
    image: gemini-share-arxuan:latest
    container_name: gemini-share-arxuan
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LICENSE_KEY: test
      GEMINI_AUDIT_OAUTH_URL: https://your-audit.example.com/api/v1/audit/oauth
      GEMINI_AUDIT_LIMIT_URL: https://your-audit.example.com/api/v1/audit/limit
      GEMINI_AUDIT_NOTIFY_URL: https://your-audit.example.com/api/v1/audit/notify
      GEMINI_GATEWAY_ADDR: 0.0.0.0:19081
      GEMINI_DB_DSN: root:gemini123@tcp(mysql:3306)/gemini?charset=utf8mb4&parseTime=true
      GEMINI_REDIS_ADDR: redis:6379
      TZ: Asia/Shanghai
    ports:
      - "19081:19081"
    volumes:
      - ./data/gemini-share-arxuan:/data
      - ./enhance.js:/app/js/enhance.js:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:19081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
